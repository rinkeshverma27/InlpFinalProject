name: nifty-nlp
channels:
  - pytorch-nightly
  - pytorch
  - nvidia
  - conda-forge
  - defaults
dependencies:
  # ── Python ────────────────────────────────────────────────────────────────
  - python=3.10

  # ── PyTorch (CUDA 12.1 — works on RTX 5060, RTX 3050) ────────────────────
  - pytorch=2.3.1
  - torchvision=0.18.1
  - torchaudio=2.3.1
  - pytorch-cuda=12.1
  # - cudatoolkit=12.1

  # ── Core Data ─────────────────────────────────────────────────────────────
  - numpy=1.26.4
  - pandas=2.2.2
  - scipy=1.13.1

  # ── Technical Analysis ────────────────────────────────────────────────────
  - ta-lib=0.4.28

  # ── Jupyter ────────────────────────────────────────────────────────────────
  - jupyter=1.0.0
  - ipykernel=6.29.5
  - notebook=7.2.1

  # ── Visualisation ─────────────────────────────────────────────────────────
  - matplotlib=3.9.1
  - seaborn=0.13.2

  # ── ML / Eval Utils ───────────────────────────────────────────────────────
  - scikit-learn=1.5.1
  - tqdm=4.66.4

  # ── Conda-forge extras ────────────────────────────────────────────────────
  - conda-forge::python-dotenv=1.0.1
  - conda-forge::pyyaml=6.0.1
  - conda-forge::jsonlines=4.0.0
  - conda-forge::feedparser=6.0.11
  - conda-forge::requests=2.32.3
  - conda-forge::aiohttp=3.9.5
  - conda-forge::git=2.45.2

  # ── Pip-only packages ─────────────────────────────────────────────────────
  - pip=24.1.2
  - pip:
      - transformers==4.42.4
      - tokenizers==0.19.1
      - datasets==2.20.0
      - accelerate==0.31.0
      - safetensors==0.4.3
      - huggingface-hub==0.23.4
      - yfinance==0.2.40
      - bitsandbytes==0.43.1
      - einops==0.8.0
      - schedule==1.2.2
      - apscheduler==3.10.4
      - gitpython==3.1.43
      - loguru==0.7.2
      - rich==13.7.1
      - pytest==8.2.2
      - pytest-cov==5.0.0
