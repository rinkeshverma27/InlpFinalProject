project:
  name: "Nifty 50 T-LSTM Hybrid"
  version: "1.0"
  description: "News-Driven Financial Prediction Engine"

system:
  FREEZE_ALL_UPDATES: false  # Emergency freeze toggle

training:
  huber_delta: 0.01
  dropout: 0.3
  learning_rate: 0.00001
  batch_size: 16
  fp16_inference: true

data:
  target_time: "10:00:00"
  nifty_stocks:
    - RELIANCE.NS
    - TCS.NS
    - HDFCBANK.NS
    - ICICIBANK.NS
    - INFY.NS
    - HINDUNILVR.NS
    - ITC.NS
    - SBIN.NS
    - BHARTIARTL.NS
    - KOTAKBANK.NS
    - BAJFINANCE.NS
    - LT.NS
    - ASIANPAINT.NS
    - HCLTECH.NS
    - AXISBANK.NS
